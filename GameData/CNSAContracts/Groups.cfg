// ============================================================================
// 文件用途：
//   本文件为 CNSA 中国航天历史任务合同包定义合同组（CONTRACT_GROUP）。
//   合同组用于统一管理一组相关合同，可设置公共属性（如机构、最大完成次数、
//   最大同时存在数量等）。本组名为 CNSA_HistoricalMissions，归属机构为
//   “中华人民共和国国防部第五研究院”，未来可在此组下继续添加其他中国航天
//   历史任务合同。
//
// 文件位置：
//   GameData/CNSAContracts/Groups.cfg
//
// 调用项目：
//   - Contract Configurator 提供的 CONTRACT_GROUP 节点支持。
//
// 可调参数说明：
//   - maxCompletions = 0   : 本组内所有合同累计可完成次数，0 表示无限制。
//                            由于组内单个合同通常自行限制为 1 次，此处保留 0。
//   - maxSimultaneous = 1  : 本组内同时可激活的合同数量，1 表示同一时间只能
//                            进行一个历史任务，避免任务过于密集。
//   - minVersion = 1.30.0  : 运行本组合同所需的 Contract Configurator 最低版本。
//                            可根据实际安装的版本调整。
// ============================================================================

CONTRACT_GROUP
{
    // 合同组内部唯一标识
    name = CNSA_HistoricalMissions

    // 在任务控制中心设置窗口与排序中显示的名称
    displayName = CNSA 中国航天历史任务

    // 排序键，字母顺序；可用数字前缀控制显示顺序
    sortKey = 01_CNSA_Historical

    // 本组合同使用的机构，需在 Agencies/Agents.cfg 中定义
    agent = 中华人民共和国国防部第五研究院

    // 运行本组所需的 Contract Configurator 最低版本
    minVersion = 1.30.0

    // 本组累计最大完成次数（0 = 无限制，由子合同各自控制）
    maxCompletions = 0

    // 本组同时最多激活的合同数量
    maxSimultaneous = 1

    // 自定义加载提示，可选
    tip = Loading Chinese space history missions...
}
