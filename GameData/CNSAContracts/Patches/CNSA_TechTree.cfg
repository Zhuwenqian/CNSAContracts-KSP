// ============================================================================
// 文件用途：
//   本文件为 CNSA 中国航天历史任务合同包提供 RP-1 科技树补丁。
//   使用 ModuleManager 语法，将 KerwisChineseAerospacePack 中与东方红一号、
//   返回式卫星等历史任务相关的部件调整到合适的 RP-1 科技节点，并添加
//   RP0conf 与 RSSROConfig 标记，使 RP-1 系统正确识别这些部件。
//
//   - 东方红一号任务相关 10 个部件放置在 1950–1960 年代节点。
//   - 返回式卫星任务相关 11 个 CZ-2 部件（含发动机）放置在 1960–1970 年代节点，
//     其中箱体/级间段/适配器/整流罩/发动机放在 orbitalRocketry1964（1964 年），
//     VEB 控制舱放在 matureAvionics（1964 年）。
//
// 文件位置：
//   GameData/CNSAContracts/Patches/CNSA_TechTree.cfg
//
// 调用项目：
//   - ModuleManager：提供 @PART、@TechRequired、% 等补丁语法。
//   - RP-1（RP-0）：提供 1950–1970 年代的科技节点定义。
//     本补丁仅在检测到 RP-0 或 RP-1 时生效（:NEEDS[RP-0|RP-1]）。
//   - KerwisChineseAerospacePack：提供以下被修改的部件。
//
// 被修改部件与科技节点对应关系（按 RP-1 Tech Tree/TreeYears.csv）：
//   东方红一号任务：
//     - DFH-1 卫星              → earlyAvionics        (1956, Avionics)
//     - CZ1_stage1 一级燃料箱    → basicRocketryRP0     (1952, Orbital)
//     - CZ1_stage2 二级箭体      → orbitalRocketry1956  (1956, Orbital)
//     - CZ1_stage3 三级固体发动机 → solids1956           (1956, Solid)
//     - CZ1_coupling 级间段      → earlyRocketry        (1950, Orbital)
//     - CZ1_fairing 整流罩       → orbitalRocketry1956  (1956, Orbital)
//     - YF2_Engine 一级发动机    → basicRocketryRP0     (1952, Orbital)
//     - YF2_with_shell 带壳发动机 → basicRocketryRP0     (1952, Orbital)
//     - YF3_Engine 二级发动机    → orbitalRocketry1956  (1956, Orbital)
//     - YF3_with_shell 带壳发动机 → orbitalRocketry1956  (1956, Orbital)
//   返回式卫星任务：
//     - CZ2_VEB-Adapter 控制舱   → matureAvionics       (1964, Avionics)
//     - CZ2_Stage1tank 一级燃料箱 → orbitalRocketry1964  (1964, Orbital)
//     - CZ2_Stage2tank 二级燃料箱 → orbitalRocketry1964  (1964, Orbital)
//     - CZ2_3700-Interstage 级间段 → orbitalRocketry1964  (1964, Orbital)
//     - CZ2_Adapter 适配器       → orbitalRocketry1964  (1964, Orbital)
//     - CZ2_Fairing 整流罩       → orbitalRocketry1964  (1964, Orbital)
//     - YF20_Engine 一级发动机   → orbitalRocketry1964  (1964, Orbital)
//     - YF21_Engine 一级发动机   → orbitalRocketry1964  (1964, Orbital)
//     - YF21_with_shell_CZ-2 带壳一级发动机 → orbitalRocketry1964 (1964, Orbital)
//     - YF22_Engine 二级主发动机 → orbitalRocketry1964  (1964, Orbital)
//     - YF23_Engine 二级游机     → orbitalRocketry1964  (1964, Orbital)
//
// 可调参数说明：
//   若希望进一步降低或提高某部件的解锁年份，可修改对应 @PART 中的
//   @TechRequired = 节点名称。具体可用节点请参见 Tech Tree/TreeYears.csv。
// ============================================================================

// ----------------------------------------------------------------------------
// DFH-1 卫星：无人卫星控制器，归属 Avionics 线 earlyAvionics（1956）。
// ----------------------------------------------------------------------------
@PART[DFH-1]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    // 覆盖原 stock 节点 unmannedTech，避免在 RP-1 中无法找到或位置过晚。
    @TechRequired = earlyAvionics

    // 关键标记：告诉 RP-1 该部件已配置为 RP-0 兼容。
    %RP0conf = true

    // 关键标记：告诉 RO/RSS 该部件已配置为 RSSRO 兼容。
    %RSSROConfig = true
}

// ----------------------------------------------------------------------------
// CZ-1 一级燃料箱：大型 LFO 箱体，归属 Orbital 线 basicRocketryRP0（1952）。
// ----------------------------------------------------------------------------
@PART[CZ1_stage1]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = basicRocketryRP0
    %RP0conf = true
    %RSSROConfig = true
}

// ----------------------------------------------------------------------------
// CZ-1 二级箭体：带 RCS 的上面级箱体，归属 Orbital 线 orbitalRocketry1956（1956）。
// ----------------------------------------------------------------------------
@PART[CZ1_stage2]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = orbitalRocketry1956
    %RP0conf = true
    %RSSROConfig = true
}

// ----------------------------------------------------------------------------
// CZ-1 三级固体发动机：固体上面级，归属 Solid 线 solids1956（1956）。
// ----------------------------------------------------------------------------
@PART[CZ1_stage3]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = solids1956
    %RP0conf = true
    %RSSROConfig = true
}

// ----------------------------------------------------------------------------
// CZ-1 级间段/连接环：多级火箭结构分离件，归属 Orbital 线 earlyRocketry（1950）。
// ----------------------------------------------------------------------------
@PART[CZ1_coupling]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = earlyRocketry
    %RP0conf = true
    %RSSROConfig = true
}

// ----------------------------------------------------------------------------
// CZ-1 整流罩：轨道发射用载荷整流罩，归属 Orbital 线 orbitalRocketry1956（1956）。
// ----------------------------------------------------------------------------
@PART[CZ1_fairing]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = orbitalRocketry1956
    %RP0conf = true
    %RSSROConfig = true
}

// ----------------------------------------------------------------------------
// YF-2 液体发动机（含带壳版本）：CZ-1 一级主动力，归属 Orbital 线
// basicRocketryRP0（1952）。
// ----------------------------------------------------------------------------
@PART[YF2_Engine|YF2_with_shell]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = basicRocketryRP0
    %RP0conf = true
    %RSSROConfig = true
}

// ----------------------------------------------------------------------------
// YF-3 液体发动机（含带壳版本）：CZ-1 二级/上面级动力，归属 Orbital 线
// orbitalRocketry1956（1956）。
// ----------------------------------------------------------------------------
@PART[YF3_Engine|YF3_with_shell]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = orbitalRocketry1956
    %RP0conf = true
    %RSSROConfig = true
}

// ============================================================================
// 返回式卫星任务：CZ-2 长征二号相关部件
// 全部放置在 1960–1970 年代节点，符合 CZ-2 基于东风五号导弹技术发展的时间线。
// ============================================================================

// ----------------------------------------------------------------------------
// CZ2_VEB-Adapter：返回式卫星控制舱/适配器，归属 Avionics 线 matureAvionics（1964）。
// ----------------------------------------------------------------------------
@PART[CZ2_VEB-Adapter]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = matureAvionics
    %RP0conf = true
    %RSSROConfig = true
}

// ----------------------------------------------------------------------------
// CZ-2 一级燃料箱：大型 LFO 箱体，归属 Orbital 线 orbitalRocketry1965（1965）。
// ----------------------------------------------------------------------------
@PART[CZ2_Stage1tank]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = orbitalRocketry1965
    %RP0conf = true
    %RSSROConfig = true
