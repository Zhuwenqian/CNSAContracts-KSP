// ----------------------------------------------------------------------------
// CZ-2 二级燃料箱：LFO 箱体，归属 Orbital 线 orbitalRocketry1965（1965）。
// ----------------------------------------------------------------------------
@PART[CZ2_Stage2tank]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
{
    @TechRequired = orbitalRocketry1965
    %RP0conf = true
    %RSSROConfig = true
