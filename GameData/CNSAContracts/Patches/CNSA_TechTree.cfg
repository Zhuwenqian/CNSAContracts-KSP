// ----------------------------------------------------------------------------
// CZ-2 级间段：多级火箭结构分离件，归属 Orbital 线 orbitalRocketry1965（1965）。
// ----------------------------------------------------------------------------
@PART[CZ2_3700-Interstage]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
