// ----------------------------------------------------------------------------
// CZ-2 整流罩：轨道发射用载荷整流罩，归属 Orbital 线 orbitalRocketry1965（1965）。
// ----------------------------------------------------------------------------
@PART[CZ2_Fairing]:FOR[CNSAContracts]:NEEDS[RP-0|RP-1]
