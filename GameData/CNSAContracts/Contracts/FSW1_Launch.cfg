// ============================================================================
// 文件用途：
//   本文件定义 CNSA 中国航天历史任务合同包中的返回式卫星任务合同。任务要求
//   玩家在 RSS-RO 环境下，于 1975 年 12 月 1 日前使用长征二号（CZ-2）运载
//   火箭，将携带返回式卫星控制舱（CZ2_VEB-Adapter）的新火箭从地球发射，
//   进入近地点 140 km 以上、远地点 2000 km 以内的地球椭圆轨道，并成功返回
//   地球（着陆或溅落）。
//
//   历史原型为中国第一颗返回式卫星“尖兵一号”（FSW-0），于 1975 年 11 月
//   26 日发射，11 月 29 日成功返回。合同截止日按 1975 年 12 月 1 日设置，
//   给玩家留出少量缓冲时间。
//
// 文件位置：
//   GameData/CNSAContracts/Contracts/FSW1_Launch.cfg
//
// 调用项目：
//   - Contract Configurator（合同配置器）提供的 CONTRACT_TYPE、PARAMETER、
//     REQUIREMENT、DATA、BEHAVIOUR 节点支持。
//   - 依赖本合同包 Agencies/Agents.cfg 中定义的“中华人民共和国国防部第五研究院”。
//   - 依赖本合同包 Patches/CNSA_TechTree.cfg 提供的 RP-1 科技树补丁。
//     该补丁将 CZ-2 各级箱体、级间段、适配器、整流罩、VEB 以及 YF-20/21/22/23
//     发动机移动到 1960–1970 年代的 RP-1 科技节点，并添加 %RP0conf = true 与
//     %RSSROConfig = true 标记，确保 RP-1 系统正确识别。
//   - 依赖 KerwisChineseAerospacePack 模组提供的以下部件：
//       CZ2_VEB-Adapter 返回式卫星控制舱/适配器
//       CZ2_Fairing 整流罩
//       CZ2_Adapter 适配器/连接环
//       CZ2_3700-Interstage 级间段
//       CZ2_Stage1tank 一级燃料箱
//       CZ2_Stage2tank 二级燃料箱
//       YF20_Engine / YF21_Engine / YF21_with_shell_CZ-2 一级发动机
//       YF22_Engine / YF23_Engine 二级/姿态发动机
//
// 关键参数说明：
//   - targetDateSeconds = 786240000.0
//     表示 1975-12-01 00:00:00 对应的 UniversalTime（秒）。计算基于 RSS
//     默认起点 1951-01-01 00:00:00 TAI：
//       1951-01-01 → 1975-01-01 = 24 年，其中闰年 6 个，共 8766 天
//       1975-01-01 → 1975-12-01 = 334 天
//       总计 9100 天 × 86400 秒 = 786240000 秒
//     若使用其他起始年份的 RP-1/RSS 配置，请按实际情况修改此值。
//   - deadline = @/targetDateSeconds - UniversalTime()
//     使合同截止时间显示为 1975-12-01（单位为秒）。该表达式在合同生成时
//     求值，因此建议玩家在合同出现后尽快接受，以获得最接近真实历史的截止时间。
//     注意：deadline/maxExpiry 需要 Single（秒），不能再用 Duration() 包装。
//   - VesselParameterGroup 中设置 completeInSequence = true，确保 CZ-2 各级
//     部件在火箭刚发射、尚未分离时即被检测并锁定，避免入轨后分离掉的
//     助推器/级间段/整流罩导致参数失败。
//   - 返回地球使用 ReachState 参数，同时检测 LANDED 与 SPLASHED 两种状态。
//   - maxCompletions = 1 : 该历史任务只能完成一次。
//   - maxSimultaneous = 1 : 同一时间内只能激活一个该合同实例。
// ============================================================================

CONTRACT_TYPE
{
    // 合同类型唯一标识
    name = CNSA_FSW1_Launch

    // 合同标题，显示在任务控制中心与合同 App 中
    title = 中国第一颗返回式卫星发射与返回任务

    // 无具体实例时显示的通用标题
    genericTitle = 中国第一颗返回式卫星发射与返回任务

    // 所属合同组，需在 Groups.cfg 中定义
    group = CNSA_HistoricalMissions

    // 委托机构，需在 Agencies/Agents.cfg 中定义
    agent = 中华人民共和国国防部第五研究院

    // 合同描述
    description = 经中央批准，我国将于 1975 年 11 月底实施首次返回式卫星发射试验。请使用长征二号（CZ-2）运载火箭，将返回式卫星送入近地点 140 km 以上、远地点 2000 km 以内的地球轨道，并安全返回地球，在 1975 年 12 月 1 日前完成任务。

    // 任务概要，加粗显示
    synopsis = 使用长征二号运载火箭发射返回式卫星并安全返回地球。

    // 任务完成后的提示信息
    completedMessage = 任务完成！返回式卫星成功再入并安全返回，中国成为第三个掌握卫星返回技术的国家。

    // 任务备注，显示在任务控制中心
    notes = 截止时间：1975 年 12 月 1 日。请使用 CZ-2 火箭各级、级间段、整流罩、适配器以及 VEB 控制舱部件，并确保是新发射的火箭。卫星再入后可着陆或溅落。

    // 目标天体：RSS 中 Kerbin 被重命名为 Earth
    targetBody = Earth

    // 声望等级：Significant（重要）
    prestige = Significant

    // 本合同最大完成次数（1 = 仅可完成一次的历史任务）
    maxCompletions = 1

    // 同时最多激活数量
    maxSimultaneous = 1

    // 是否允许取消/拒绝
    cancellable = true
    declinable = true

    // 是否自动接受（false = 玩家手动接受）
    autoAccept = false

    // 合同权重，越大越容易被系统选中提供
    weight = 15.0

    // 存储目标日期对应的 UniversalTime（秒）
    DATA
    {
        type = double
        targetDateSeconds = 786240000.0
    }

    // 合同接受后的完成截止时间，动态计算为距 1975-12-01 的剩余秒数
    // 注意：该值在合同生成/提供时求值，建议尽快接受合同
    // deadline/maxExpiry 需要 Single（秒），直接用数值表达式，不要包 Duration()
    deadline = @/targetDateSeconds - UniversalTime()

    // 合同在任务控制中心的最短/最长保留时间
    // minExpiry = 0 表示可立即过期；maxExpiry 与 deadline 一致，确保不会在截止日期后仍被接受
    minExpiry = 0
    maxExpiry = @/targetDateSeconds - UniversalTime()

    // 合同奖励与惩罚（可根据经济平衡调整）
    advanceFunds = 75000.0
    rewardFunds = 200000.0
    rewardScience = 75.0
    rewardReputation = 40.0
    failureFunds = 35000.0
    failureReputation = 20.0

    // ==========================================================
    // REQUIREMENT：合同被提供的前提条件
    // ==========================================================

    // 条件 1：必须在 1975-12-01 之前被提供
    REQUIREMENT
    {
        name = Expression_BeforeDeadline
        type = Expression

        title = 必须在 1975 年 12 月 1 日前接受合同

        // UniversalTime() 返回游戏内绝对时间（秒）
        expression = UniversalTime() < @/targetDateSeconds
    }

    // 条件 2：必须已解锁 CZ2_VEB-Adapter 返回式卫星控制舱
    REQUIREMENT
    {
        name = PartUnlocked_CZ2_VEB_Adapter
        type = PartUnlocked

        // CZ2_VEB-Adapter 部件名来自 KerwisChineseAerospacePack/Parts/Command/CZ-2/VEB-Adapter-CZ2.cfg
        part = CZ2_VEB-Adapter
    }

    // 条件 3：必须已解锁 CZ-2 整流罩
    REQUIREMENT
    {
        name = PartUnlocked_CZ2_Fairing
        type = PartUnlocked

        // CZ2_Fairing 部件名来自 KerwisChineseAerospacePack/Parts/Fairing/CZ2_fairing/Fairing-CZ-2.cfg
        part = CZ2_Fairing
    }

    // 条件 4：必须已解锁 CZ-2 适配器/连接环
    REQUIREMENT
    {
        name = PartUnlocked_CZ2_Adapter
        type = PartUnlocked

        // CZ2_Adapter 部件名来自 KerwisChineseAerospacePack/Parts/Adapter/CZ-2/Adapter-CZ-2.cfg
        part = CZ2_Adapter
    }

    // 条件 5：必须已解锁 CZ-2 级间段
    REQUIREMENT
    {
        name = PartUnlocked_CZ2_3700_Interstage
        type = PartUnlocked

        // CZ2_3700-Interstage 部件名来自 KerwisChineseAerospacePack/Parts/Interstage/Interstage-3.7m-CZ-2.cfg
        part = CZ2_3700-Interstage
    }

    // 条件 6：必须已解锁 CZ-2 一级燃料箱
    REQUIREMENT
    {
        name = PartUnlocked_CZ2_Stage1tank
        type = PartUnlocked

        // CZ2_Stage1tank 部件名来自 KerwisChineseAerospacePack/Parts/Tank/CZ-2/Stage1tank-CZ-2.cfg
        part = CZ2_Stage1tank
    }

    // 条件 7：必须已解锁 CZ-2 二级燃料箱
    REQUIREMENT
    {
        name = PartUnlocked_CZ2_Stage2tank
        type = PartUnlocked

        // CZ2_Stage2tank 部件名来自 KerwisChineseAerospacePack/Parts/Tank/CZ-2/Stage2tank-CZ-2.cfg
        part = CZ2_Stage2tank
    }

    // 条件 8：必须先达到过太空（避免开局即刷出高难度轨道合同）
    REQUIREMENT
    {
        name = ReachSpace_Requirement
        type = ReachSpace
    }

    // ==========================================================
    // PARAMETER：合同完成目标
    // ==========================================================

    // 使用 VesselParameterGroup 将多个 vessel 相关参数绑定到同一艘船上
    // completeInSequence = true 保证按顺序检查：先判定为新火箭，再立即检查
    // CZ-2 各部件是否存在（在分离前完成），然后检查入轨，最后检查返回地球。
    PARAMETER
    {
        name = FSW1_Mission_Vessel
        type = VesselParameterGroup

        // 将完成该参数组的飞船注册为 FSW1_Satellite，便于后续合同引用
        define = FSW1_Satellite

        // 参数组标题
        title = 使用长征二号火箭发射返回式卫星并安全返回地球

        // 参数按顺序完成；一旦某参数完成，即使后续分离掉对应部件也仍算完成
        completeInSequence = true

        // 子参数 1：必须为新发射的火箭（接受合同后发射）
        PARAMETER
        {
            name = NewVessel
            type = NewVessel

            title = 发射一枚新火箭
        }

        // 子参数 2：飞船上必须携带至少 1 个 CZ2_VEB-Adapter 控制舱
        PARAMETER
        {
            name = PartValidation_CZ2_VEB_Adapter
            type = PartValidation

            part = CZ2_VEB-Adapter
            minCount = 1

            title = 运载火箭包含 CZ-2 VEB 控制舱（返回式卫星）
        }

        // 子参数 3：飞船上必须携带至少 1 个 CZ-2 整流罩
        PARAMETER
        {
            name = PartValidation_CZ2_Fairing
            type = PartValidation

            part = CZ2_Fairing
            minCount = 1

            title = 运载火箭包含 CZ-2 整流罩
        }

        // 子参数 4：飞船上必须携带至少 1 个 CZ-2 适配器/连接环
        PARAMETER
        {
            name = PartValidation_CZ2_Adapter
            type = PartValidation

            part = CZ2_Adapter
            minCount = 1

            title = 运载火箭包含 CZ-2 适配器
        }

        // 子参数 5：飞船上必须携带至少 1 个 CZ-2 级间段
        PARAMETER
        {
            name = PartValidation_CZ2_3700_Interstage
            type = PartValidation

            part = CZ2_3700-Interstage
            minCount = 1

            title = 运载火箭包含 CZ-2 级间段
        }

        // 子参数 6：飞船上必须携带至少 1 个 CZ-2 一级燃料箱
        PARAMETER
        {
            name = PartValidation_CZ2_Stage1tank
            type = PartValidation

            part = CZ2_Stage1tank
            minCount = 1

            title = 运载火箭包含 CZ-2 一级燃料箱
        }

        // 子参数 7：飞船上必须携带至少 1 个 CZ-2 二级燃料箱
        PARAMETER
        {
            name = PartValidation_CZ2_Stage2tank
            type = PartValidation

            part = CZ2_Stage2tank
            minCount = 1

            title = 运载火箭包含 CZ-2 二级燃料箱
        }

        // 子参数 8：飞船必须处于地球轨道
        PARAMETER
        {
            name = ReachState_Orbit
            type = ReachState

            targetBody = Earth
            situation = ORBITING

            title = 进入地球轨道
        }

        // 子参数 9：轨道参数满足任务要求
        PARAMETER
        {
            name = Orbit_FSW1
            type = Orbit

            targetBody = Earth

            // 近地点最低 140 km（140000 米）
            minPeA = 140000.0

            // 远地点最高 2000 km（2000000 米）
            maxApA = 2000000.0

            // 最小/最大偏心率不限制，允许椭圆轨道
            minEccentricity = 0.0
            maxEccentricity = 1.0

            // 倾角不限制
            minInclination = 0.0
            maxInclination = 180.0

            title = 轨道：近地点 140 km 以上，远地点 2000 km 以内
        }

        // 子参数 10：飞船必须成功返回地球（着陆或溅落）
        PARAMETER
        {
            name = ReachState_ReturnHome
            type = ReachState

            targetBody = Earth

            // 同时检测 LANDED 与 SPLASHED，满足任意一种即算返回成功
            situation = LANDED
            situation = SPLASHED

            title = 成功返回地球（着陆或溅落）
        }
    }
}
