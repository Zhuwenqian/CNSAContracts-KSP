// ============================================================================
// 文件用途：
//   本文件为 CNSA 中国航天历史任务合同包定义专属机构（Agency）。
//   机构名称为“中华人民共和国国防部第五研究院”，是东方红一号等早期
//   中国航天任务的委托方。通过 mentality = NoRandomContractMentality
//   禁止其他随机合同抢夺本机构，确保只有本合同包中的合同会使用该机构。
//
// 调用项目：
//   - Contract Configurator（合同配置器）提供的 AGENT 节点支持。
//   -  mentality = NoRandomContractMentality 由 Contract Configurator 提供。
//
// 使用说明：
//   - logoURL 与 logoScaledURL 指向的贴图需要用户自行准备，建议尺寸
//     分别为 256x160 与 64x40，放在 GameData/ContractPacks/CNSAContracts/
//     Agencies/ 目录下。若暂时无贴图，KSP 会显示默认机构图标。
//   - 所有路径均为相对 KSP 安装目录 GameData/ 的相对路径。
// ============================================================================

AGENT
{
    // 机构内部唯一标识，与 CONTRACT_TYPE / CONTRACT_GROUP 中 agent 字段对应
    name = 中华人民共和国国防部第五研究院

    // 机构显示名称（与 name 保持一致）
    title = 中华人民共和国国防部第五研究院

    // 机构简介，会显示在任务控制中心的机构详情中
    description = 中国航天事业的发源地，负责导弹、运载火箭与卫星的研制。1956年设立，承担了东方红一号等早期航天任务。

    // 机构标志贴图路径（256x160，相对 GameData/）
    // 需要自行准备 PNG 贴图；此处为示例路径
    logoURL = ContractPacks/CNSAContracts/Agencies/DFH1_Agency

    // 机构缩略图路径（64x40，相对 GameData/）
    logoScaledURL = ContractPacks/CNSAContracts/Agencies/DFH1_Agency_scaled

    // 禁止其他随机合同使用本机构，确保机构专属
    mentality = NoRandomContractMentality
}
