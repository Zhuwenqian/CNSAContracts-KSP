// ============================================================================
// 文件用途：
//   本文件定义 CNSA 中国航天历史任务合同包中的首个合同：东方红一号卫星
//   发射任务。任务要求玩家在 RSS-RO 环境下，于 1970 年 4 月 30 日前将
//   携带 DFH-1 卫星部件的新火箭发射升空，并进入近地点 140 km 以上、
//   远地点 2000 km 以内的地球椭圆轨道。
//
// 调用项目：
//   - Contract Configurator（合同配置器）提供的 CONTRACT_TYPE、PARAMETER、
//     REQUIREMENT、DATA、BEHAVIOUR 节点支持。
//   - 依赖本合同包 Agencies/Agents.cfg 中定义的“中华人民共和国国防部第五研究院”。
//   - 依赖 KerwisChineseAerospacePack 模组提供的 DFH-1 部件（name = DFH-1）。
//
// 关键参数说明：
//   - targetDateSeconds = 609984000.0
//     表示 1970-04-30 00:00:00 对应的 UniversalTime（秒）。计算基于 RSS
//     默认起点 1951-01-01 00:00:00 TAI：
//       1951-01-01 → 1970-01-01 = 19 年，其中闰年 5 个，共 6940 天
//       1970-01-01 → 1970-04-30 = 120 天
//       总计 7060 天 × 86400 秒 = 609984000 秒
//     若使用其他起始年份的 RP-1/RSS 配置，请按实际情况修改此值。
//   - deadline = Duration(@/targetDateSeconds - UniversalTime())
//     使合同截止时间显示为 1970-04-30。该表达式在合同生成时求值，因此
//     建议玩家在合同出现后尽快接受，以获得最接近真实历史的截止时间。
//   - maxCompletions = 1 : 该历史任务只能完成一次。
//   - maxSimultaneous = 1 : 同一时间内只能激活一个该合同实例。
// ============================================================================

CONTRACT_TYPE
{
    // 合同类型唯一标识
    name = CNSA_DFH1_Launch

    // 合同标题，显示在任务控制中心与合同 App 中
    title = 东方红一号卫星发射任务

    // 无具体实例时显示的通用标题
    genericTitle = 东方红一号卫星发射任务

    // 所属合同组，需在 Groups.cfg 中定义
    group = CNSA_HistoricalMissions

    // 委托机构，需在 Agencies/Agents.cfg 中定义
    agent = 中华人民共和国国防部第五研究院

    // 合同描述
    description = 经中央批准，我国将于 1970 年 4 月 24 日前后实施首次人造地球卫星发射。请设计并发射一枚运载火箭，将东方红一号卫星送入近地点 140 km 以上、远地点 2000 km 以内的地球轨道，并在 1970 年 4 月 30 日前完成任务。

    // 任务概要，加粗显示
    synopsis = 将东方红一号卫星送入预定地球轨道。

    // 任务完成后的提示信息
    completedMessage = 任务完成！东方红一号成功在轨运行，中国成为第五个独立发射人造卫星的国家。

    // 任务备注，显示在任务控制中心
    notes = 截止时间：1970 年 4 月 30 日。请使用 DFH-1 卫星部件，并确保是新发射的火箭。

    // 目标天体：RSS 中 Kerbin 被重命名为 Earth
    targetBody = Earth

    // 声望等级：Significant（重要）
    prestige = Significant

    // 本合同最大完成次数（1 = 仅可完成一次的历史任务）
    maxCompletions = 1

    // 同时最多激活数量
    maxSimultaneous = 1

    // 是否允许取消/拒绝
    cancellable = true
    declinable = true

    // 是否自动接受（false = 玩家手动接受）
    autoAccept = false

    // 合同权重，越大越容易被系统选中提供
    weight = 15.0

    // 存储目标日期对应的 UniversalTime（秒）
    DATA
    {
        type = double
        targetDateSeconds = 609984000.0
    }

    // 合同接受后的完成截止时间，动态计算为距 1970-04-30 的剩余秒数
    // 注意：该值在合同生成/提供时求值，建议尽快接受合同
    deadline = Duration(@/targetDateSeconds - UniversalTime())

    // 合同在任务控制中心的最短/最长保留时间
    // minExpiry = 0 表示可立即过期；maxExpiry 与 deadline 一致，确保不会在截止日期后仍被接受
    minExpiry = 0
    maxExpiry = Duration(@/targetDateSeconds - UniversalTime())

    // 合同奖励与惩罚（可根据经济平衡调整）
    advanceFunds = 50000.0
    rewardFunds = 150000.0
    rewardScience = 50.0
    rewardReputation = 30.0
    failureFunds = 25000.0
    failureReputation = 15.0

    // ==========================================================
    // REQUIREMENT：合同被提供的前提条件
    // ==========================================================

    // 条件 1：必须在 1970-04-30 之前被提供
    REQUIREMENT
    {
        name = Expression_BeforeDeadline
        type = Expression

        title = 必须在 1970 年 4 月 30 日前接受合同

        // UniversalTime() 返回游戏内绝对时间（秒）
        expression = UniversalTime() < @/targetDateSeconds
    }

    // 条件 2：必须已解锁 DFH-1 卫星部件
    REQUIREMENT
    {
        name = PartUnlocked_DFH1
        type = PartUnlocked

        // DFH-1 部件名来自 KerwisChineseAerospacePack/Parts/Command/DFH1/DFH1.cfg
        part = DFH-1
    }

    // 条件 3：必须先达到过太空（避免开局即刷出高难度轨道合同）
    REQUIREMENT
    {
        name = ReachSpace_Requirement
        type = ReachSpace
    }

    // ==========================================================
    // PARAMETER：合同完成目标
    // ==========================================================

    // 使用 VesselParameterGroup 将多个 vessel 相关参数绑定到同一艘船上
    PARAMETER
    {
        name = DFH1_Mission_Vessel
        type = VesselParameterGroup

        // 将完成该参数组的飞船注册为 DFH1_Satellite，便于后续合同引用
        define = DFH1_Satellite

        // 参数组标题
        title = 发射东方红一号卫星并进入预定轨道

        // 子参数 1：必须为新发射的火箭（接受合同后发射）
        PARAMETER
        {
            name = NewVessel
            type = NewVessel

            title = 发射一枚新火箭
        }

        // 子参数 2：飞船上必须携带至少 1 个 DFH-1 卫星部件
        PARAMETER
        {
            name = PartValidation_DFH1
            type = PartValidation

            part = DFH-1
            minCount = 1

            title = 运载火箭携带东方红一号卫星
        }

        // 子参数 3：飞船必须处于地球轨道
        PARAMETER
        {
            name = ReachState_Orbit
            type = ReachState

            targetBody = Earth
            situation = ORBITING

            title = 进入地球轨道
        }

        // 子参数 4：轨道参数满足任务要求
        PARAMETER
        {
            name = Orbit_DFH1
            type = Orbit

            targetBody = Earth

            // 近地点最低 140 km（140000 米）
            minPeA = 140000.0

            // 远地点最高 2000 km（2000000 米）
            maxApA = 2000000.0

            // 最小/最大偏心率不限制，允许椭圆轨道
            minEccentricity = 0.0
            maxEccentricity = 1.0

            // 倾角不限制
            minInclination = 0.0
            maxInclination = 180.0

            title = 轨道：近地点 140 km 以上，远地点 2000 km 以内
        }
    }
}
